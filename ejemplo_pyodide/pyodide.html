<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Runner Pyodide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Python Web WASM</a>
      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="index.html">Inicio</a>
        <a class="btn btn-outline-light btn-sm" href="marimo.html">marimo WASM</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-4">
            <span class="badge text-bg-primary mb-3">Pyodide + CodeMirror</span>
            <h1 class="h3 fw-bold">Runner Python local</h1>
            <p class="text-secondary">
              Ejecuta Python en el navegador del usuario. La primera carga puede tardar porque descarga el runtime WASM.
            </p>
            <div class="status-box mb-3">
              <div class="small text-secondary">Estado</div>
              <div id="runtimeStatus" class="fw-semibold">Inicializando Pyodide...</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <button id="runBtn" class="btn btn-primary" disabled>Ejecutar</button>
              <button id="clearBtn" class="btn btn-outline-dark">Limpiar salida</button>
              <button id="exampleBtn" class="btn btn-outline-secondary">Cargar ejemplo</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <strong>Editor</strong>
            <span class="small text-secondary">CodeMirror</span>
          </div>
          <div class="card-body p-0">
            <textarea id="pythonCode">import os

nombre = "Guaren"
for i in range(1, 6):
    print(f"{i}. Hola {nombre} desde Python en el navegador\n\tTexto con tabulación")

respuesta = input("Escribe algo: ")
print(f"Ingresaste: {respuesta}")

# En Pyodide esto se emula para limpiar la consola del navegador
# os.system("cls")

sumatoria = sum(range(1, 101))
print("Después de cls solo queda esta parte")
sumatoria</textarea>
          </div>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <strong>Salida</strong>
            <span class="small text-secondary">stdout / stderr / resultado</span>
          </div>
          <div class="card-body p-0">
            <pre id="consoleOutput" class="console-output mb-0">Cargando runtime...</pre>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.4/full/pyodide.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="assets/js/pyodide-runner.js"></script>
</body>
</html>
